<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CNET Admission Portal 2025–26</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap');
:root{
  --navy:#1a2744;--navy2:#243260;--gold:#c8972a;--gold-light:#f5e8c8;
  --cream:#fdfaf4;--white:#fff;--text:#1e2330;--muted:#6b7280;
  --border:#dde3ee;--err:#c0392b;--ok:#1a7a4a;--bg:#f0f3f9;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--cream);color:var(--text);min-height:100vh;}

/* HEADER */
header{background:var(--navy);position:sticky;top:0;z-index:50;box-shadow:0 2px 12px rgba(0,0,0,.3);}
.hdr{max-width:860px;margin:0 auto;display:flex;align-items:center;gap:14px;padding:13px 20px;}
.logo{width:42px;height:42px;border-radius:50%;background:var(--gold);display:flex;align-items:center;
  justify-content:center;font-family:'Playfair Display',serif;font-size:20px;color:var(--navy);font-weight:700;flex-shrink:0;}
.hdr-txt h1{font-size:17px;color:#fff;font-family:'Playfair Display',serif;}
.hdr-txt p{font-size:10px;color:var(--gold-light);margin-top:1px;letter-spacing:.5px;}

/* PROGRESS */
.prog-wrap{background:var(--navy);padding:0 20px 14px;}
.prog-inner{max-width:860px;margin:0 auto;display:flex;align-items:center;}
.step-dot-wrap{display:flex;flex-direction:column;align-items:center;gap:3px;min-width:52px;}
.step-dot{width:24px;height:24px;border-radius:50%;border:2px solid rgba(255,255,255,.25);
  display:flex;align-items:center;justify-content:center;font-size:10px;color:rgba(255,255,255,.5);font-weight:600;}
.step-dot.done{background:var(--gold);border-color:var(--gold);color:var(--navy);}
.step-dot.active{background:var(--gold);border-color:var(--gold);color:var(--navy);}
.step-lbl{font-size:9px;color:rgba(255,255,255,.45);text-align:center;line-height:1.2;}
.step-lbl.active{color:var(--gold);}
.step-lbl.done{color:rgba(255,255,255,.65);}
.prog-line{flex:1;height:2px;background:rgba(255,255,255,.15);}
.prog-line.done{background:var(--gold);}

/* EDIT BANNER */
.edit-banner{background:linear-gradient(135deg,#243260,#1a2744);padding:10px 20px;
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;font-size:13px;color:#fff;}
.edit-banner strong{color:var(--gold);}
.eb-btn{padding:5px 14px;border-radius:6px;background:rgba(255,255,255,.15);
  border:1px solid rgba(255,255,255,.3);color:#fff;font-size:11px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;}

/* MAIN */
main{max-width:860px;margin:0 auto;padding:24px 20px 80px;}

/* LANDING */
.land{text-align:center;padding:40px 0;}
.land h2{font-family:'Playfair Display',serif;font-size:24px;color:var(--navy);margin:14px 0 8px;}
.land p{color:var(--muted);font-size:14px;margin-bottom:28px;}
.land-cards{display:grid;grid-template-columns:1fr 1fr;gap:14px;max-width:440px;margin:0 auto;text-align:left;}
.land-card{background:var(--white);border:2px solid var(--border);border-radius:14px;
  padding:22px 18px;cursor:pointer;transition:border-color .2s,box-shadow .2s;}
.land-card:hover{border-color:var(--gold);box-shadow:0 4px 20px rgba(200,151,42,.15);}
.land-card .lci{font-size:26px;margin-bottom:8px;}
.land-card h3{font-size:14px;font-weight:700;color:var(--navy);margin-bottom:3px;}
.land-card p{font-size:12px;color:var(--muted);margin:0;}

/* LOOKUP */
.lookup-box{background:var(--white);border-radius:14px;padding:30px;max-width:440px;
  margin:40px auto;box-shadow:0 4px 24px rgba(0,0,0,.08);text-align:center;}
.lookup-box h3{font-size:17px;font-weight:700;color:var(--navy);margin-bottom:6px;}
.lookup-box p{font-size:13px;color:var(--muted);margin-bottom:18px;}
.lookup-row{display:flex;gap:8px;}
.lookup-row input{flex:1;padding:10px 13px;border:1.5px solid var(--border);border-radius:8px;
  font-family:'Inter',sans-serif;font-size:14px;outline:none;text-transform:uppercase;letter-spacing:1px;}
.lookup-row input:focus{border-color:var(--gold);}
.lookup-err{color:var(--err);font-size:12px;margin-top:8px;text-align:left;}

/* SECTION HEADER */
.sec-hdr{border-left:4px solid var(--gold);padding-left:13px;margin-bottom:22px;}
.sec-hdr h2{font-size:19px;font-weight:700;color:var(--navy);}
.sec-hdr p{font-size:13px;color:var(--muted);margin-top:3px;}

/* FORM GRID */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px 22px;}
.grid .full{grid-column:1/-1;}

/* FIELD */
.fld{display:flex;flex-direction:column;gap:5px;}
.fld label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;color:var(--navy);}
.fld label .req{color:var(--gold);margin-left:2px;}
.fld input,.fld select,.fld textarea{
  border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;
  font-family:'Inter',sans-serif;font-size:14px;color:var(--text);background:var(--white);
  outline:none;transition:border-color .15s,box-shadow .15s;width:100%;}
.fld input:focus,.fld select:focus,.fld textarea:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(200,151,42,.1);}
.fld input.err,.fld select.err{border-color:var(--err);}
.fld textarea{resize:vertical;min-height:70px;}
.fld .emsg{font-size:11px;color:var(--err);}

/* MARK FIELD */
.mark-wrap{position:relative;}
.mark-wrap input{padding-right:48px;}
.mark-badge{position:absolute;right:11px;top:50%;transform:translateY(-50%);
  font-size:10px;color:var(--muted);font-weight:700;pointer-events:none;}

/* RADIO PILLS */
.radio-grp{display:flex;gap:8px;flex-wrap:wrap;}
.pill{display:flex;align-items:center;gap:8px;padding:10px 16px;
  border:1.5px solid var(--border);border-radius:30px;cursor:pointer;
  font-size:14px;font-weight:500;background:var(--white);user-select:none;transition:border-color .15s,background .15s;}
.pill input[type=radio]{width:15px;height:15px;accent-color:var(--gold);flex-shrink:0;}
.pill.checked{border-color:var(--gold);background:rgba(200,151,42,.09);font-weight:700;color:var(--navy);}

/* CHECKBOX */
.chk-row{display:flex;align-items:center;gap:10px;padding:11px 13px;
  border:1.5px solid var(--border);border-radius:8px;background:var(--white);cursor:pointer;}
.chk-row input[type=checkbox]{width:16px;height:16px;accent-color:var(--gold);}
.chk-row span{font-size:13px;}

/* CONDITIONAL BLOCK */
.cond{background:#f8f5ee;border:1.5px solid var(--gold-light);border-radius:10px;
  padding:16px;margin-top:14px;display:none;}
.cond.show{display:block;}
.cond-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;
  color:var(--navy);margin-bottom:12px;display:flex;align-items:center;gap:7px;}
.cond-title::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--gold);display:inline-block;}

/* FILE UPLOAD */
.file-area{border:2px dashed var(--border);border-radius:10px;padding:16px;
  text-align:center;background:var(--white);cursor:pointer;position:relative;transition:border-color .15s;}
.file-area:hover{border-color:var(--gold);}
.file-area input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.file-area .fi{font-size:22px;}
.file-area p{font-size:11px;color:var(--muted);margin-top:3px;}
.file-name{font-size:12px;color:var(--ok);margin-top:5px;font-weight:600;}

/* DIVIDER */
hr.div{border:none;border-top:1.5px solid var(--border);margin:22px 0;}

/* NAV */
.nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:28px;}
.btn{padding:11px 24px;border-radius:8px;font-family:'Inter',sans-serif;
  font-size:14px;font-weight:600;cursor:pointer;border:none;transition:opacity .15s,transform .1s;}
.btn:active{transform:scale(.98);}
.btn-primary{background:var(--navy);color:#fff;}
.btn-primary:hover{opacity:.88;}
.btn-outline{background:transparent;color:var(--navy);border:1.5px solid var(--border);}
.btn-outline:hover{background:rgba(0,0,0,.04);}
.btn-gold{background:var(--gold);color:#fff;}
.btn-gold:hover{opacity:.88;}

/* REVIEW */
.rv-sec{margin-bottom:18px;}
.rv-sec h3{font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--navy);
  font-weight:700;border-bottom:2px solid var(--gold);padding-bottom:5px;margin-bottom:8px;}
.rv-row{display:grid;grid-template-columns:1fr 1.5fr;gap:3px 12px;
  padding:5px 0;border-bottom:1px solid var(--border);font-size:13px;}
.rv-row .rk{color:var(--muted);}
.rv-row .rv{color:var(--text);font-weight:500;word-break:break-all;}

/* SUCCESS */
.success{text-align:center;padding:50px 20px;}
.success h2{font-family:'Playfair Display',serif;font-size:26px;color:var(--navy);margin:14px 0 8px;}
.success p{color:var(--muted);font-size:14px;max-width:380px;margin:0 auto 20px;}
.app-id{display:inline-block;background:var(--gold-light);border:1.5px solid var(--gold);
  border-radius:8px;padding:10px 22px;font-size:18px;font-weight:700;color:var(--navy);
  letter-spacing:1px;margin-bottom:20px;}
.btn-row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}

/* LOADING */
.loading{text-align:center;padding:50px;}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--gold);
  border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 14px;}
@keyframes spin{to{transform:rotate(360deg);}}

@media(max-width:580px){
  .grid{grid-template-columns:1fr;}
  .grid .full{grid-column:1;}
  .land-cards{grid-template-columns:1fr;}
  .radio-grp{flex-direction:column;}
  .pill{width:100%;}
  .rv-row{grid-template-columns:1fr;}
  main{padding:18px 14px 80px;}
}
</style>
</head>
<body>

<header>
  <div class="hdr">
    <div class="logo">C</div>
    <div class="hdr-txt">
      <h1>CNET Admission Portal</h1>
      <p>ONLINE APPLICATION FORM · 2025–26</p>
    </div>
  </div>
  <div class="prog-wrap" id="progWrap" style="display:none">
    <div class="prog-inner" id="progInner"></div>
  </div>
</header>
<div id="editBanner" style="display:none"></div>
<main id="app"></main>

<script>
// ══════════════════════════════════════════════
//  CONFIG
// ══════════════════════════════════════════════
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbzgR-bPXTTLsasZhd7DvI4ASE6J9Uqvj0HEWCg-uGx6M1UC3M9PrNiJR362e0NrcSb7/exec';
const STORE_KEY = 'cnet_apps_v2';

// ══════════════════════════════════════════════
//  LOCAL STORAGE
// ══════════════════════════════════════════════
function loadApps(){ try{ return JSON.parse(localStorage.getItem(STORE_KEY)||'[]'); }catch{ return []; } }
function saveApps(arr){ localStorage.setItem(STORE_KEY, JSON.stringify(arr)); }
function addApp(data){
  const apps = loadApps();
  const id = 'CNET'+Date.now().toString(36).toUpperCase();
  const rec = {...data, _id:id, _submittedAt:new Date().toLocaleString('en-IN')};
  apps.push(rec); saveApps(apps); return id;
}
function updateApp(id, data){
  const apps = loadApps();
  const i = apps.findIndex(a=>a._id===id);
  if(i<0) return false;
  const rec = {...data, _id:id, _submittedAt:apps[i]._submittedAt, _updatedAt:new Date().toLocaleString('en-IN')};
  apps[i]=rec; saveApps(apps); return true;
}
function findApp(id){ return loadApps().find(a=>a._id===id.trim().toUpperCase())||null; }

// ══════════════════════════════════════════════
//  GOOGLE SHEETS — multi-method sender
// ══════════════════════════════════════════════
function sendToSheet(payload, cb){
  // Method: Image ping with data encoded in URL
  // Google Apps Script doGet reads the data param and saves it
  // No CORS issues since we use an Image tag
  const json = JSON.stringify(payload);
  const encoded = encodeURIComponent(json);
  const url = SHEET_URL + '?action=save&data=' + encoded;

  // Try fetch first (works sometimes)
  let done = false;
  function finish(ok){
    if(done) return;
    done = true;
    cb(ok);
  }

  // Method 1: Image beacon (no CORS, fire and forget)
  try {
    const img = new Image();
    img.onload = ()=> finish(true);
    img.onerror = ()=> finish(true); // Apps Script returns redirect = onerror but data IS saved
    img.src = url;
    // Give it 8 seconds
    setTimeout(()=> finish(true), 8000);
  } catch(e){
    finish(false);
  }
}

// ══════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════
let step = 0;
let editId = null;
let fd = {};   // form data object

const STEPS = ['Account','CNET','Personal','Aadhaar','Category','Marks','Documents','Review'];

// ══════════════════════════════════════════════
//  PROGRESS BAR
// ══════════════════════════════════════════════
function showProg(){ document.getElementById('progWrap').style.display='block'; renderProg(); }
function hideProg(){ document.getElementById('progWrap').style.display='none'; }
function renderProg(){
  const el = document.getElementById('progInner');
  let h='';
  STEPS.forEach((s,i)=>{
    const cls = i<step?'done':i===step?'active':'';
    h+=`<div class="step-dot-wrap">
      <div class="step-dot ${cls}">${i<step?'✓':(i+1)}</div>
      <div class="step-lbl ${cls}">${s}</div>
    </div>`;
    if(i<STEPS.length-1) h+=`<div class="prog-line ${i<step?'done':''}"></div>`;
  });
  el.innerHTML=h;
}

// ══════════════════════════════════════════════
//  HELPERS — build HTML
// ══════════════════════════════════════════════
function F(id,label,type='text',req=true,opts={}){
  const star = req?'<span class="req">*</span>':'';
  const ph = opts.ph||'';
  const full = opts.full?' full':'';
  let inp='';
  if(type==='select'){
    const os=(opts.options||[]).map(o=>`<option value="${o.v||o}">${o.l||o}</option>`).join('');
    inp=`<select id="${id}" ${req?'required':''}><option value="">Select…</option>${os}</select>`;
  } else if(type==='textarea'){
    inp=`<textarea id="${id}" placeholder="${ph}" ${req?'required':''}></textarea>`;
  } else {
    inp=`<input type="${type}" id="${id}" placeholder="${ph}" ${req?'required':''}/>`;
  }
  return `<div class="fld${full}"><label for="${id}">${label}${star}</label>${inp}<span class="emsg" id="e_${id}"></span></div>`;
}

function MF(id,label,max=24){
  return `<div class="fld"><label for="${id}">${label}<span class="req">*</span></label>
    <div class="mark-wrap"><input type="number" id="${id}" min="0" max="${max}" step="0.01" required placeholder="0"/>
    <span class="mark-badge">/${max}</span></div>
    <span class="emsg" id="e_${id}"></span></div>`;
}

function FILE(id,label,req=true){
  const star=req?'<span class="req">*</span>':'';
  return `<div class="fld full"><label>${label}${star}</label>
    <div class="file-area">
      <input type="file" id="${id}" accept=".pdf,.jpg,.jpeg,.png" onchange="showFN('${id}')"/>
      <div class="fi">📎</div>
      <p>Click to upload · PDF / JPG / PNG · Max 5 MB</p>
      <div class="file-name" id="fn_${id}"></div>
    </div></div>`;
}

function showFN(id){
  const f=document.getElementById(id);
  const s=document.getElementById('fn_'+id);
  if(f&&f.files[0]) s.textContent='✓ '+f.files[0].name;
}

function RADIO(name,opts,req=true,onch=''){
  return opts.map(o=>`
    <label class="pill" id="pill_${name}_${o.v||o}">
      <input type="radio" name="${name}" value="${o.v||o}" ${req?'required':''} onchange="syncPills('${name}');${onch}">
      ${o.l||o}
    </label>`).join('');
}

function syncPills(name){
  document.querySelectorAll(`.pill input[name="${name}"]`).forEach(r=>{
    r.closest('.pill').classList.toggle('checked',r.checked);
  });
}

// ══════════════════════════════════════════════
//  STEP CONTENT
// ══════════════════════════════════════════════
function stepHTML(){
  if(step===0) return `
    <div class="sec-hdr"><h2>Account Details</h2><p>Create your login credentials for this application.</p></div>
    <div class="grid">
      ${F('email','Email Address','email')}
      ${F('mobile','Mobile Number','tel',true,{ph:'10-digit number'})}
      ${F('password','Password','password')}
      ${F('confirm_password','Confirm Password','password')}
    </div>`;

  if(step===1) return `
    <div class="sec-hdr"><h2>CNET / Exam Details</h2><p>Enter details exactly as on your CNET scorecard.</p></div>
    <div class="grid">
      ${F('registration_id','Registration ID','text')}
      ${F('roll_no','Roll Number','text')}
      ${F('open_rank','Open Rank','number')}
      ${F('cnet_percentile','CNET Percentile','number',true,{ph:'e.g. 87.50'})}
      ${F('category_rank','Category Rank','number',false)}
      ${F('sub_category_rank','Sub-Category Rank','number',false)}
    </div>`;

  if(step===2) return `
    <div class="sec-hdr"><h2>Personal Details</h2><p>As appearing on your official documents.</p></div>
    <div class="grid">
      ${F('full_name','Full Name','text',true,{full:true})}
      ${F('father_name',"Father's Name",'text')}
      ${F('mother_name',"Mother's Name",'text')}
      ${F('email_personal','Personal Email','email',false)}
      ${F('mobile_personal','Personal Mobile','tel',false)}
      ${F('name_10th','Name as per 10th Certificate','text',true,{full:true})}
      ${F('dob_10th','DOB as per 10th Certificate','date')}
      ${F('dob','Date of Birth','date')}
      ${F('address','Residential Address','textarea',true,{full:true,ph:'House No., Street, City, State, PIN'})}
      <div class="fld full">
        <label>Hostel Facility Required<span class="req">*</span></label>
        <div class="radio-grp">${RADIO('hostel',[{v:'Yes',l:'Yes'},{v:'No',l:'No'}])}</div>
        <span class="emsg" id="e_hostel"></span>
      </div>
    </div>`;

  if(step===3) return `
    <div class="sec-hdr"><h2>Aadhaar Verification</h2><p>Exactly as printed on your Aadhaar card.</p></div>
    <div class="grid">
      ${F('aadhar_name','Name as on Aadhaar','text',true,{full:true})}
      ${F('aadhar_dob','Date of Birth as on Aadhaar','date')}
      ${F('aadhar_address','Address as on Aadhaar','textarea',true,{full:true,ph:'Full address as on Aadhaar'})}
    </div>`;

  if(step===4) return `
    <div class="sec-hdr"><h2>Category &amp; Quota</h2><p>Select your category — extra fields appear automatically.</p></div>
    <div class="grid">
      <div class="fld full">
        <label>Main Category<span class="req">*</span></label>
        <div class="radio-grp">${RADIO('main_category',[{v:'UR',l:'UR'},{v:'EWS',l:'EWS'},{v:'OBC',l:'OBC'},{v:'SC',l:'SC'},{v:'ST',l:'ST'}],true,"onCatChange()")}</div>
        <span class="emsg" id="e_main_category"></span>
      </div>
      <div class="fld full">
        <label>Sub Category<span class="req">*</span></label>
        <div class="radio-grp">${RADIO('sub_category',[{v:'OPEN',l:'OPEN'},{v:'PH',l:'PH'},{v:'EX',l:'EX'},{v:'FF',l:'FF'},{v:'NCC',l:'NCC'}],true,"onSubChange()")}</div>
        <span class="emsg" id="e_sub_category"></span>
      </div>
    </div>
    <div class="cond" id="c_scst">
      <div class="cond-title">SC / ST — Caste Certificate</div>
      <div class="grid">
        ${F('caste_cert_name','Certificate Issued In Name Of','text',false)}
        ${F('caste_cert_date','Certificate Issue Date','date',false)}
      </div>
    </div>
    <div class="cond" id="c_obc">
      <div class="cond-title">OBC — Certificate (Year 2025)</div>
      <div class="grid">${F('obc_cert_date','OBC Certificate Issue Date','date',false)}</div>
    </div>
    <div class="cond" id="c_ews">
      <div class="cond-title">EWS — Certificate (on or after 1 Apr 2026)</div>
      <div class="grid">${F('ews_cert_date','EWS Certificate Issue Date','date',false)}</div>
    </div>
    <div class="cond" id="c_ph">
      <div class="cond-title">Sub-Category: PH (PwD)</div>
      <div class="grid">
        ${F('pwd_percent','Disability Percentage (%)','number',false)}
        ${F('pwd_type','Disability Type','text',false)}
        <div class="fld full">
          <label>Lower Limb Disability Confirmed?</label>
          <div class="radio-grp">${RADIO('lower_limb',[{v:'Yes',l:'Yes'},{v:'No',l:'No'}],false,'')}</div>
        </div>
      </div>
    </div>
    <div class="cond" id="c_ncc">
      <div class="cond-title">Sub-Category: NCC</div>
      <div class="grid">
        ${F('ncc_cert_type','NCC Certificate Type','select',false,{options:['C']})}
        ${F('ncc_cert_grade','NCC Certificate Grade','select',false,{options:['B']})}
      </div>
    </div>`;

  if(step===5) return `
    <div class="sec-hdr"><h2>Marks</h2><p>Enter marks as on certificates. CNET subjects are out of 24.</p></div>
    <p style="font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:12px">CNET Subject Marks</p>
    <div class="grid">
      ${MF('marks_nursing','Nursing Aptitude',24)}
      ${MF('marks_physics','Physics',24)}
      ${MF('marks_chemistry','Chemistry',24)}
      ${MF('marks_biology','Biology',24)}

  if(step===7){
    const g=(k)=>fd[k]||'—';
    return `

    <div class="rv-sec"><h3>CNET</h3>
      <div class="rv-row"><span class="rk">Registration ID</span><span class="rv">${g('registration_id')}</span></div>
      <div class="rv-row"><span class="rk">Roll No.</span><span class="rv">${g('roll_no')}</span></div>

      <div class="rv-row"><span class="rk">12th Physics %</span><span class="rv">${g('pct_12_physics')}</span></div>
      <div class="rv-row"><span class="rk">12th Chemistry %</span><span class="rv">${g('pct_12_chemistry')}</span></div>

// ══════════════════════════════════════════════
//  COLLECT + RESTORE
// ══════════════════════════════════════════════
function collect(){
  document.querySelectorAll('#app input:not([type=radio]):not([type=checkbox]):not([type=file]),#app select,#app textarea')
    .forEach(el=>{ if(el.id) fd[el.id]=el.value; });
  document.querySelectorAll('#app input[type=radio]:checked')
    .forEach(el=>{ if(el.name) fd[el.name]=el.value; });
  document.querySelectorAll('#app input[type=checkbox]')
    .forEach(el=>{ if(el.id) fd[el.id]=el.checked?'Yes':'No'; });
}

function restore(){
  Object.entries(fd).forEach(([k,v])=>{
    const el=document.getElementById(k);
    if(!el) return;
    if(el.type==='checkbox') el.checked=(v==='Yes');
    else if(el.tagName!=='INPUT'||el.type!=='radio') el.value=v;
  });
  // radios
  ['hostel','main_category','sub_category','lower_limb'].forEach(name=>{
    if(fd[name]){
      const r=document.querySelector(`input[name="${name}"][value="${fd[name]}"]`);
      if(r){ r.checked=true; syncPills(name); }
    }
  });
  if(step===4){ onCatChange(); onSubChange(); }
  if(step===6){ applyDocBlocks(); }
}

// ══════════════════════════════════════════════
//  CATEGORY CONDITIONAL
// ══════════════════════════════════════════════
function onCatChange(){
  const cat=document.querySelector('input[name="main_category"]:checked')?.value||'';
  toggle('c_scst', cat==='SC'||cat==='ST');
  toggle('c_obc', cat==='OBC');
  toggle('c_ews', cat==='EWS');
}
function onSubChange(){
  const sub=document.querySelector('input[name="sub_category"]:checked')?.value||'';
  toggle('c_ph', sub==='PH');
  toggle('c_ncc', sub==='NCC');
}
function applyDocBlocks(){
  const cat=fd.main_category||'';
  const sub=fd.sub_category||'';
  toggle('dc_scst', cat==='SC'||cat==='ST');
  toggle('dc_obc', cat==='OBC');
  toggle('dc_ews', cat==='EWS');
  toggle('dc_ph', sub==='PH');
  toggle('dc_ncc', sub==='NCC');
}
function toggle(id, show){
  const el=document.getElementById(id);
  if(el) el.style.display=show?'block':'none';
}

// ══════════════════════════════════════════════
//  VALIDATE
// ══════════════════════════════════════════════
function validate(){
  let ok=true, first=null;
  // text/number/select/textarea
  document.querySelectorAll('#app [required]:not([type=radio]):not([type=checkbox]):not([type=file])').forEach(el=>{
    const emsg=document.getElementById('e_'+el.id);
    if(!el.value.trim()){
      if(emsg) emsg.textContent='Required.';
      el.classList.add('err');
      if(!first) first=el;
      ok=false;
    } else {
      if(emsg) emsg.textContent='';
      el.classList.remove('err');
    }
  });
  // radios — only visible groups
  const rnames=new Set();
  document.querySelectorAll('#app input[type=radio][required]').forEach(el=>{
    if(el.closest('.cond')&&el.closest('.cond').style.display==='none') return;
    rnames.add(el.name);
  });
  rnames.forEach(name=>{
    if(!document.querySelector(`#app input[name="${name}"]:checked`)){
      const emsg=document.getElementById('e_'+name);
      if(emsg) emsg.textContent='Please select an option.';
      if(!first) first=document.querySelector(`#app input[name="${name}"]`);
      ok=false;
    } else {
      const emsg=document.getElementById('e_'+name);
      if(emsg) emsg.textContent='';
    }
  });
  // password match
  const pw=document.getElementById('password');
  const cpw=document.getElementById('confirm_password');
  if(pw&&cpw&&pw.value&&pw.value!==cpw.value){
    const emsg=document.getElementById('e_confirm_password');
    if(emsg) emsg.textContent='Passwords do not match.';
    cpw.classList.add('err');
    if(!first) first=cpw;
    ok=false;
  }
  if(!ok&&first) first.scrollIntoView({behavior:'smooth',block:'center'});
  return ok;
}

// ══════════════════════════════════════════════
//  RENDER STEP
// ══════════════════════════════════════════════
function render(){
  showProg(); renderProg();
  const app=document.getElementById('app');
  const isLast=step===STEPS.length-1;
  app.innerHTML=stepHTML()+`
    <div class="nav-row">
      ${step>0?`<button class="btn btn-outline" onclick="goBack()">← Back</button>`:`<span></span>`}
      ${isLast
        ?`<button class="btn btn-gold" onclick="doSubmit()">${editId?'Save Changes ✓':'Submit Application ✓'}</button>`
        :`<button class="btn btn-primary" onclick="goNext()">Next →</button>`}
    </div>`;
  restore();
  window.scrollTo({top:0,behavior:'smooth'});
}

function goNext(){ collect(); if(!validate()) return; step++; render(); }
function goBack(){ collect(); step--; render(); }

// ══════════════════════════════════════════════
//  SUBMIT / UPDATE
// ══════════════════════════════════════════════
function doSubmit(){
  try {
    collect();
  } catch(ex){ alert('Collect error: '+ex.message); return; }

  const app=document.getElementById('app');

  // Generate ID first
  let appId;
  let payload;
  let isEdit = !!editId;

  try {
    if(isEdit){
      updateApp(editId, fd);
      appId = editId;
      payload = Object.assign({}, fd, {
        _id: appId,
        _action: 'UPDATE',
        _updatedAt: new Date().toLocaleString('en-IN')
      });
    } else {
      appId = addApp(fd);
      payload = Object.assign({}, fd, {
        _id: appId,
        _submittedAt: new Date().toLocaleString('en-IN')
      });
    }
  } catch(ex){ alert('Save error: '+ex.message); return; }

  // Show loading
  hideProg();
  document.getElementById('editBanner').style.display='none';
  app.innerHTML='<div class="loading"><div class="spinner"></div><p>Saving your application…</p></div>';

  // Send to sheet with 10s timeout fallback
  let done = false;
  function finish(sent){
    if(done) return;
    done = true;
    const action = isEdit ? 'Updated' : 'Submitted';
    app.innerHTML=`<div class="success">
      <div style="font-size:52px">${isEdit?'✅':'🎓'}</div>
      <h2>Application ${action}!</h2>
      <p>Note your Application ID for future reference.</p>
      <div class="app-id">${appId}</div>
      <p style="margin-bottom:6px;font-size:13px;color:${sent?'var(--ok)':'var(--err)'}">
        ${sent
          ? '✓ Data saved to Google Sheets successfully'
          : '⚠ Could not reach Google Sheets — data saved on this device only'}
      </p>
      <div class="btn-row" style="margin-top:18px">
        <button class="btn btn-primary" onclick="showLanding()">Home</button>
        ${!isEdit?'<button class="btn btn-outline" onclick="startNew()">Submit Another</button>':''}
        <button class="btn btn-gold" onclick="startEdit(''+appId+'')">Edit This Application</button>
      </div>
    </div>`;
    editId = null;
  }

  // Timeout fallback — show success after 10s even if fetch hangs
  setTimeout(()=>finish(false), 10000);

  try {
    const body = 'data=' + encodeURIComponent(JSON.stringify(payload));
    fetch(SHEET_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: {'Content-Type':'application/x-www-form-urlencoded'},
      body: body
    }).then(()=>finish(true)).catch(()=>finish(false));
  } catch(ex){
    finish(false);
  }
}

// ══════════════════════════════════════════════
//  LANDING
// ══════════════════════════════════════════════
function showLanding(){
  editId=null; step=0; fd={};
  hideProg();
  document.getElementById('editBanner').style.display='none';
  document.getElementById('app').innerHTML=`
    <div class="land">
      <div style="font-size:50px">🎓</div>
      <h2>CNET Admission Portal</h2>
      <p>Submit a new application or update an existing one.</p>
      <div class="land-cards">
        <div class="land-card" onclick="startNew()">
          <div class="lci">📝</div>
          <h3>New Application</h3>
          <p>Fill and submit a fresh application</p>
        </div>
        <div class="land-card" onclick="showLookup()">
          <div class="lci">✏️</div>
          <h3>Edit Application</h3>
          <p>Update using your Application ID</p>
        </div>
      </div>
    </div>`;
}

function startNew(){
  editId=null; step=0; fd={};
  document.getElementById('editBanner').style.display='none';
  render();
}

// ══════════════════════════════════════════════
//  LOOKUP / EDIT
// ══════════════════════════════════════════════
function showLookup(){
  hideProg();
  document.getElementById('editBanner').style.display='none';
  document.getElementById('app').innerHTML=`
    <div class="lookup-box">
      <h3>✏️ Edit Your Application</h3>
      <p>Enter your Application ID to load and update your submission.</p>
      <div class="lookup-row">
        <input id="lid" placeholder="e.g. CNETMQTBH8KV"
          oninput="this.value=this.value.toUpperCase()"
          onkeydown="if(event.key==='Enter')doLookup()"/>
        <button class="btn btn-primary" onclick="doLookup()">Find</button>
      </div>
      <div class="lookup-err" id="lerr"></div>
      <div style="margin-top:18px"><button class="btn btn-outline" onclick="showLanding()">← Back</button></div>
    </div>`;
}

function doLookup(){
  const val=document.getElementById('lid').value.trim().toUpperCase();
  const err=document.getElementById('lerr');
  if(!val){ err.textContent='Please enter your Application ID.'; return; }
  const rec=findApp(val);
  if(!rec){ err.textContent='❌ No application found with this ID on this device.'; return; }
  startEdit(val);
}

function startEdit(id){
  const rec=findApp(id);
  if(!rec){ showLookup(); return; }
  editId=id; step=0;
  fd={}; Object.assign(fd,rec);
  const banner=document.getElementById('editBanner');
  banner.style.display='block';
  banner.innerHTML=`<div class="edit-banner">
    <span>✏️ Editing <strong>${id}</strong> — submitted ${rec._submittedAt||''}</span>
    <button class="eb-btn" onclick="showLanding()">✕ Cancel</button>
  </div>`;
  render();
}

// ══════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════
showLanding();
</script>
